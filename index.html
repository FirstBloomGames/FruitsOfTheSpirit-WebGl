<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Fruit of the Spirit: Orchard Bloom</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
  </head>
  <body>
    <main id="unity-container">
      <canvas id="unity-canvas" width="1080" height="1920" tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-loading-title">Fruit of the Spirit</div>
        <div id="unity-loading-subtitle">Growing your orchard...</div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <button id="unity-fullscreen-button" type="button" aria-label="Fullscreen">Full</button>
      <div id="unity-warning"></div>
    </main>
    <script>
      var canvas = document.querySelector("#unity-canvas");

      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? "block" : "none";
        }
        var div = document.createElement("div");
        div.innerHTML = msg;
        div.className = type === "error" ? "unity-banner-error" : "unity-banner-warning";
        warningBanner.appendChild(div);
        if (type !== "error") {
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var cacheVersion = new URLSearchParams(window.location.search).get("v") || Date.now().toString();
      function versioned(url) {
        return url + "?v=" + encodeURIComponent(cacheVersion);
      }
      var loaderUrl = versioned(buildUrl + "/FruitsOfTheSpirit.loader.js");
      var config = {
        arguments: [],
        dataUrl: versioned(buildUrl + "/FruitsOfTheSpirit.data"),
        frameworkUrl: versioned(buildUrl + "/FruitsOfTheSpirit.framework.js"),
        codeUrl: versioned(buildUrl + "/FruitsOfTheSpirit.wasm"),
        streamingAssetsUrl: "StreamingAssets",
        companyName: "First Bloom Games",
        productName: "Fruit of the Spirit Orchard Bloom",
        productVersion: "0.1.0",
        showBanner: unityShowBanner,
        cacheControl: function(url) {
          return "no-store";
        }
      };

      config.devicePixelRatio = Math.min(window.devicePixelRatio || 1, 2);
      document.querySelector("#unity-loading-bar").style.display = "flex";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = function() {
        createUnityInstance(canvas, config, function(progress) {
          document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
        }).then(function(unityInstance) {
          document.querySelector("#unity-loading-bar").style.display = "none";
          document.querySelector("#unity-fullscreen-button").onclick = function() {
            unityInstance.SetFullscreen(1);
          };
        }).catch(function(message) {
          alert(message);
        });
      };

      document.body.appendChild(script);
    </script>
  </body>
</html>
